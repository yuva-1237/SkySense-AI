version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CACHE_TTL=600
    restart: always
